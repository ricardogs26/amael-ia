     
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-bridge-deployment
  namespace: amael-ia  # <-- CORREGIDO
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-bridge
  template:
    metadata:
      labels:
        app: whatsapp-bridge
    spec:
      containers:
      - name: whatsapp-bridge
        image: registry.richardx.dev/whatsapp-bridge:1.5.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: whatsapp-session-storage
          mountPath: /usr/src/app/.wwebjs_auth
        - name: shm
          mountPath: /dev/shm
        env:
        - name: AMAEL_BASE_URL
          value: "http://backend-service:8000"
        - name: AMAEL_API_URL
          value: "http://backend-service:8000/api/chat"
        - name: AMAEL_JWT_TOKEN
          valueFrom:
            secretKeyRef:
              name: amael-secrets
              key: jwt-token
        - name: AMAEL_INTERNAL_SECRET
          valueFrom:
            secretKeyRef:
              name: google-auth-secret
              key: internal_api_secret
        - name: K8S_AGENT_URL
          value: "http://k8s-agent-service:8002"
        resources:
          requests:
            memory: "768Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: whatsapp-session-storage
        persistentVolumeClaim:
          claimName: whatsapp-session-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-bridge-service
  namespace: amael-ia  # <-- CORREGIDO
spec:
  type: NodePort # NodePort para acceder desde fuera del clúster
  selector:
    app: whatsapp-bridge
  ports:
    - protocol: TCP
      port: 3000       # Puerto del servicio
      targetPort: 3000  # Puerto del contenedor
      nodePort: 30007   # Puerto en tu máquina local (puedes cambiarlo)
