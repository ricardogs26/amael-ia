apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-agent-policy
  namespace: amael-ia
  labels:
    app: k8s-agent
    component: sre-policy
data:
  # ─── Umbral de confianza ────────────────────────────────────────────────────
  # El agente solo ejecuta una acción automática si el diagnóstico LLM
  # devuelve una confianza >= a este valor (0.0-1.0).
  # Por debajo → NOTIFY_HUMAN en lugar de actuar.
  SRE_CONFIDENCE_THRESHOLD: "0.75"

  # ─── Guardrail de reinicios ─────────────────────────────────────────────────
  # Máximo de rollout restarts automáticos permitidos por deployment
  # dentro de la ventana de tiempo definida abajo.
  # Al alcanzar el límite → NOTIFY_HUMAN para investigación manual.
  SRE_MAX_RESTARTS_PER_RESOURCE: "3"

  # Ventana de tiempo (en minutos) para contar reinicios.
  # Los contadores en Redis expiran después de esta ventana.
  SRE_RESTART_WINDOW_MINUTES: "15"

  # ─── Circuit Breaker ────────────────────────────────────────────────────────
  # Número de fallos consecutivos en acciones SRE antes de abrir el circuito.
  # Con el circuito OPEN el loop solo observa, no actúa.
  SRE_CB_FAILURE_THRESHOLD: "5"

  # Tiempo en segundos antes de intentar HALF_OPEN (probar si el sistema
  # se recuperó) después de que el circuito se abre.
  SRE_CB_RECOVERY_TIMEOUT_S: "600"
