apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: amael-ia  # <-- CORREGIDO
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets: []
      containers:
      - name: backend-container
        image: registry.richardx.dev/backend-ia:2.16.4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
          - name: LLM_VISION_MODEL
            value: "qwen2.5vl:3b"
          - name: TF_SERVING_URL
            value: "http://tf-serving-service:8501/v1/models/imagenet_classifier:predict"
          - name: GOOGLE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: google-auth-secret
                key: client_id
          - name: GOOGLE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: google-auth-secret
                key: client_secret
          - name: JWT_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: google-auth-secret
                key: jwt_secret_key
          - name: SESSION_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: google-auth-secret
                key: session_secret_key
          - name: ALLOWED_EMAILS_CSV
            valueFrom:
              configMapKeyRef:
                name: allowed-users-configmap
                key: ALLOWED_EMAILS_CSV
          - name: K8S_ALLOWED_USERS_CSV
            valueFrom:
              configMapKeyRef:
                name: allowed-users-configmap
                key: K8S_ALLOWED_USERS_CSV
          - name: INTERNAL_API_SECRET
            valueFrom:
              secretKeyRef:
                name: google-auth-secret
                key: internal_api_secret
          # --- NUEVAS VARIABLES DATABASE (PHASE 2) ---
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: amael-secrets
                key: POSTGRES_PASSWORD
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: amael-secrets
                key: MINIO_ROOT_PASSWORD
          - name: CHAT_HISTORIES_DIR
            value: "/chat_histories"
        volumeMounts:
        - name: legacy-history
          mountPath: /chat_histories
      volumes:
        - name: legacy-history
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: amael-ia
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
  
