apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amael-ia-ingress
  namespace: amael-ia
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # SSE streaming: disable buffering so /api/chat/stream tokens arrive in real-time
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
spec:
  tls:
  - hosts:
    - amael-ia.richardx.dev
    secretName: amael-ia-tls-secret
  rules:
  - host: "amael-ia.richardx.dev"
    http:
      paths:
      # API (backend FastAPI)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      # LLM Adapter (OpenAI-compatible proxy)
      - path: /llm
        pathType: Prefix
        backend:
          service:
            name: llm-adapter-service
            port:
              number: 80
      # TTS (CosyVoice)
      - path: /tts
        pathType: Prefix
        backend:
          service:
            name: cosyvoice-service
            port:
              number: 8000
      # Frontend (Next.js)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-next-service
            port:
              number: 3000
