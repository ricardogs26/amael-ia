# =========================================================================
# ⚠️ ADVERTENCIA DE SEGURIDAD ⚠️
# Este es un archivo de PLANTILLA para que sepas qué secretos necesita el clúster.
# NUNCA ingreses contraseñas reales, tokens o API keys en este archivo.
#
# INSTRUCCIONES:
# 1. Copia este archivo y llámalo: `1A.-amael-secrets.yaml` (este nombre estará ignorado por Git).
# 2. Reemplaza los valores "TU_VALOR_AQUI" por tus claves en base64 en tu copia local.
# 3. Aplica tu copia local al clúster: `kubectl apply -f k8s/1A.-amael-secrets.yaml`
# =========================================================================

apiVersion: v1
kind: Secret
metadata:
  name: google-auth-secret
  namespace: amael-ia
type: Opaque
stringData:
  # Secretos de Google OAuth2 (Google Cloud Console)
  client_id: "TU_GOOGLE_CLIENT_ID_AQUI"
  client_secret: "TU_GOOGLE_CLIENT_SECRET_AQUI"
  
  # Firmas JWT y Sesiones de FastAPI (Generar con: `openssl rand -hex 32`)
  jwt_secret_key: "TU_JWT_SECRET_KEY_AQUI"
  session_secret_key: "TU_SESSION_SECRET_KEY_AQUI"
  
  # Comunicación Interna entre Microservicios (Backend <-> Productivity)
  internal_api_secret: "TU_INTERNAL_API_SECRET_AQUI"

---
apiVersion: v1
kind: Secret
metadata:
  name: amael-secrets
  namespace: amael-ia
type: Opaque
stringData:
  # Token inyectado en whatsapp-bridge para hablar con backend-ia
  jwt-token: "TU_JWT_BOT_TOKEN_AQUI"

---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-agent-secret
  namespace: amael-ia
type: Opaque
stringData:
  # Telemetría de New Relic
  new_relic_account_id: "TU_NR_ACCOUNT_ID_AQUI"
  new_relic_api_key: "TU_NR_API_KEY_AQUI"
